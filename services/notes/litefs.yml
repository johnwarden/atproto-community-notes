# LiteFS configuration for Community Notes Service
# Architecture: Single writer (this service) with read-only replicas
# This service is always the primary writer, other services are read-only

# FUSE mount directory for LiteFS
fuse:
  dir: "/litefs"

# Data directory where LiteFS stores its data
data:
  dir: "/var/lib/litefs"

# No proxy - let Node.js app handle HTTP directly
# LiteFS just provides shared database access

# Lease configuration - this service is always the primary writer
lease:
  type: "consul"
  candidate: true
  promote: true

  consul:
    url: "${FLY_CONSUL_URL}"
    key: "litefs/${FLY_APP_NAME}"

# No backup configuration - using LiteFS replication only

# Execute the Node.js application after LiteFS is ready
exec:
  - cmd: "node --heapsnapshot-signal=SIGUSR2 --enable-source-maps index.js"