# fly.toml app configuration file for Community Notes Service
#
# Environment variables are passed via `just deploy` command
# Secrets are managed via `just setup-secrets` command

app = 'notes'
primary_region = 'sjc'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '8081'
  INTERNAL_PORT = '8082'
  PDS_URL = 'https://bsky.network'
  DB_PATH = '/data/notes.db'
  # DIDs will be set via deploy command or can be set here for production
  # REPO_DID = 'did:plc:your-production-repo-did'
  # FEEDGEN_DOCUMENT_DID = 'did:plc:your-production-feedgen-did'
  # LABELER_DID = 'did:plc:your-production-labeler-did'
  # LABELER_URL = 'https://labeler.example.com'

[[services]]
  protocol = "tcp"
  internal_port = 8081
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "1s"
    method = "GET"
    path = "/health"

[processes]
  app = "node index.js"

[deploy]
  strategy = "immediate"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

# Persistent volume for database
[[mounts]]
  source = "notes_data"
  destination = "/data"
