# fly.toml app configuration file for Community Notes Service
#
# Environment variables are passed via `just deploy` command
# Secrets are managed via `just setup-secrets` command

app = 'atproto-notes-api'
primary_region = 'sjc'

[build]
  dockerfile = "services/notes/Dockerfile"

# Public API service (port 8080 -> 80/443)
[[services]]
  protocol = "tcp"
  internal_port = 8080
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "1s"
    method = "GET"
    path = "/health"

# Internal API service (port 8081, internal only)
[[services]]
  protocol = "tcp"
  internal_port = 8081
  processes = ["app"]
  
  # Internal services don't need external ports
  # This service is accessible via Fly's internal networking only

[deploy]
  strategy = "immediate"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

# LiteFS configuration
[experimental]
  enable_consul = true

[mounts]
  source = "litefs"
  destination = "/var/lib/litefs"
